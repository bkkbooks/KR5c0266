body:
  text: 思印氣訣法薄八印封山川河海江湖先叩齒十二通向所印地左手捻都監訣閉氣步九跡若山川者思作鹵簿天官吏兵隨方色皆持鉤鑲鉞斧大行分散山林間炎山如獵狗開目廓山林木口吸氣內左咋微吞氣目中新煆林神三人衣赤幘在口中三舉目大視三吸氣咋三吞氣三人主引氣如牽縮入口中羅網口左咋吞之入腹中山川河海江湖皆三舉目營五吸氣三咋一咽氣滿吞之合九咋然後口吸氣向印祝二十八宿三官約誓黃神越章十二時百二十禁防令氣聚精縮氣印山山崩印邪邪消印鬼鬼死印叛叛亡即還印盜賊刀兵毒疫及諸山賊盡皆摧折便左手持印封之閉氣二十便持印去以某口四面吹惡氣左手書地作井字去勿顧存肝中三人衣青衣赤幘鉤鑲鉞斧存心中三人衣赤衣赤幘鉤鑲鉞斧存肺中三人衣白衣赤幘鉤鑲鉞斧存脾中三人衣黃衣赤幘鉤鑲鉞斧存腎中三人衣黑衣赤幘鉤鑲鉞斧手抑頭視目歷山三過畢如法氣數以百二十章印懸官法常印竈前井圊附左右人家奴婢叛及去絆馬皆當順封其跡必去逆封其跡必還雷電霹靂在人屋舍左右前後先三吸取霹靂邪氣噓印中封宅四角克止惡人欲擊人以印封其命上若疫氣流行以真朱投印齒中封人門户上若封符廟當入廟捻都監訣閉氣向四面吸廟神畢噓印齒上印五酉送鬼法若有山石及大樹比伐之為作穴足容印以竈土若酒和之著於穴中間閉氣十二息禹步印之呪曰太上老君千兵萬騎收捕天下大樹之精髙山之靈黿鼉龜鱉魍魎魃魅天下五酉狐狸老獺伏死天罡下斬頭截舌不得動作急急如律令惡人逆吏當見中傷封之法見逆人便引左氣十二加右以印向之仍進三步閉氣三通閉目一氣便心咒曰天道通我日月利我星辰保我四時養我五行成我謀議呪詛惡人逆吏伏尸天罡下急急如北斗越章律令封門户齗鬼法文作章鑿穿如印大赤土著中向人家商角徵羽上印之畢禹步著門上字向外咒曰里社邑君道上二玄三元四始甲子諸官君門伯戶丞直竈君宅中里更青龍白虎朱雀玄武天一貴人六合天后道民某甲家口如干人今居某里中與太上有約天師有言使甲家從年竟歲無他灾患縣官消伏逆惡滅亡盜賊者絶口舌不生水火伏死又却五兵隂陽利幸男女貴昌宅中安穩無有羣殃吏兵北斗與日月列行印神真符保以金剛急急如律令法解考隂灾當天罡加灾者以今日之神名呼三過閉氣極息印向天門左足加右回進二跡三呼太上無極大道太上老君太上三氣君玉陛下天師祭酒受天之經案天之紀四時五行斬無道之子千精萬邪伏不敢起急急如律令名山大澤符廟封之法向王散髮禹步三過閉氣二十四便視天見一人長三千萬丈烏衣赤幘手持三五神符來集印上狀如二寸一分亦取土著上左足加右九躡上次以印向鬼次土著廟前去二十步許閉氣三過一呼左太上右玄老太上收汝魂急急如律令若去廟遠者可以印內懷中三過閉氣呪印三五列行北斗縱橫三台五斗今在我後千鬼萬神莫不越走急急如律令若天行時病厄急以印宿露著案上一宿旦以香水一斗亦可五升洗之以真朱粉之往病家未至三五十步存心為火在前徑往燒病人家屋令目見蕩盡次存腎氣作水往殺火次進視病人左手捧心呪曰君豫真何以太上生汝便以左足加右引左氣十二加右以印印額上氣止厭光怪者以印內懷中白紙著竈上以清水一升著竈前次閉氣三通以印泥上過左回轉閉氣而去若千里外速行不得隂暗恐懼不安可取井中土一斗著器中令乾槁平旦以印印之向東閉氣握固九過還土著井中若亡人復冢墓不安可以真朱著印齒中以白素辟方一尺印之遂封著隧中次作著床頭無鬼不安穩千神皆歡樂復連斷絶若蠶不收女子不冝蠶及宅中虛耗可以鐵人各二枚埋著竈中以印印向王次土甎辟方一尺印之著圊前去圊三尺以印字向王也若家有火厭之者以大板長一尺二寸廣七寸朱書上作元官考生君天帝精鬼神懸著圊前吉若天灾疫氣流行鬼殺人千師萬術不敢禁可以青竹十二節著井中斷之竹節長三寸三分一宿取之以白米三升酒三升著器中又一宿次以竹著酒中又一宿平旦以一合與一人服之皆令王日作之服之向王服若家女水淹則不行大家饒人口别住心可房房各作斷之一法天罡日取井華水一升向王再拜印著水中散髮東向以左手三攪水令轉以右足左御髮便却步二十四跡以水投竈中勿令人知之思印氣訣法
